{% extends "base.html" %}

{% block title %}Reset Password | LEVEL UP{% endblock %}

{% block content %}
<div class="auth-container" data-reveal>
    <div class="auth-card">
        <span class="eyebrow">Secure access</span>
        <h2>Reset password</h2>
        <p class="sub-text">Enter your email to begin account recovery.</p>

        {% if message %}
            <p class="success">{{ message }}</p>
        {% endif %}

        <form method="POST">
            <input
                type="email"
                name="email"
                placeholder="Enter your registered email"
                autocomplete="email"
                required
            >
            <button type="submit">Send reset link</button>
        </form>

        <p class="switch-auth">
            Remember your password?
            <a href="{{ url_for('login') }}">Sign in</a>
        </p>
    </div>
</div>
{% endblock %}
